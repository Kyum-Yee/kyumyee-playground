name: Keep Render Alive

on:
  schedule:
    - cron: '*/14 * * * *'  # 14분마다 — Render 무료 플랜 15분 sleep 방지
  workflow_dispatch:         # 수동 실행 허용

jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - name: Ping Render service
        run: |
          URL="https://kyumyee-playground.onrender.com/health"
          STATUS=$(curl -s -o /dev/null -w "%{http_code}" "$URL" --max-time 30 || echo "000")
          echo "Pinged $URL → HTTP $STATUS"
          if [ "$STATUS" = "000" ]; then
            echo "::warning::Render service unreachable (timeout or network error)"
          fi
